name: Pull Request
'on':
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.png'

jobs:
  unit-tests:
    uses: ./.github/workflows/job-unit-tests.yml
    secrets: inherit

  ui-tests:
    uses: ./.github/workflows/job-ui-tests.yml
    secrets: inherit

  dependency-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}-${{ hashFiles('**/*.toml*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Checkout base branch + generate report
        run: |
          git checkout ${{ github.base_ref }}
          ./gradlew :app:dependencies --configuration liveReleaseRuntimeClasspath >> before.txt

      - name: Checkout head branch + generate report
        run: |
          git checkout ${{ github.head_ref }}
          ./gradlew :app:dependencies --configuration liveReleaseRuntimeClasspath >> after.txt

      - name: Generate dependency diff
        id: diff
        uses: thementalgoose/gradle-dependency-diff@v2
        with:
          before: before.txt
          after: after.txt
          output_to_file: true
          post_pr_comment: true
          show_removals: false
